<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Parts Database</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
button{padding:10px;margin-top:10px;background:#22c55e;border:none;border-radius:6px;cursor:pointer}
input{padding:10px;margin:5px;width:100%}
.card{background:#111827;padding:20px;border-radius:10px;margin-bottom:20px}
.notice{padding:10px;margin-top:10px;border-radius:6px}
.success{background:#14532d}
.error{background:#7f1d1d}
.warning{background:#78350f}
.hidden{display:none}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>
<div id="authMessage"></div>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>
</div>

<div class="card">
<h2>Upload Parts</h2>
<div id="uploadMessage"></div>
<input type="file" id="file">
<button onclick="scanUpload()">Scan Upload</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://asktsoajslylhuxajnic.supabase.co",
  "sb_publishable_TiND-DM-GZUcIVJ39EEvGQ_Tj7Fmwam"
);

function showMessage(el, text, type){
  el.innerHTML = text ? `<div class='notice ${type}'>${text}</div>` : "";
}

function normalize(p){return p.toUpperCase().replace(/[^A-Z0-9]/g,"")}

function read(row, keys){
  for(const k of keys){ if(row[k]) return row[k] }
  return ""
}

function parseCSV(text){
  const lines = text.split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(l=>{
    const vals = l.split(",");
    let o={};
    headers.forEach((h,i)=>o[h.trim()]=vals[i]);
    return o;
  });
}

async function fileToRows(file){
  if(file.name.endsWith(".csv")){
    return parseCSV(await file.text());
  }
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
}

async function login(){
  const {data,error} = await supabase.auth.signInWithPassword({
    email:document.getElementById("email").value,
    password:document.getElementById("password").value
  });
  if(error) showMessage(authMessage,error.message,'error');
  else showMessage(authMessage,'Logged in','success');
}

async function signup(){
  const {error} = await supabase.auth.signUp({
    email:document.getElementById("email").value,
    password:document.getElementById("password").value
  });
  if(error) showMessage(authMessage,error.message,'error');
  else showMessage(authMessage,'Account created','success');
}

async function scanUpload(){
  const elMsg = document.getElementById("uploadMessage");
  showMessage(elMsg,"Scanning...","warning");

  try{
    const file = document.getElementById("file").files[0];
    if(!file) return showMessage(elMsg,"Choose file","warning");

    const rows = await fileToRows(file);
    if(!rows.length) return showMessage(elMsg,"No rows","error");

    let usable = 0;

    rows.forEach(r=>{
      const p = read(r,['part_number','Part Number']);
      if(p) usable++;
    });

    if(!usable){
      return showMessage(elMsg,"No valid part_number column found","error");
    }

    showMessage(elMsg,`Scan complete. Rows: ${rows.length} Usable: ${usable}`,'success');

  }catch(e){
    showMessage(elMsg,e.message,'error');
  }
}
</script>

</body>
</html>
