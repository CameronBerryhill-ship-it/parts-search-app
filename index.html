<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parts Database</title>
</head>
<body>

<div id="authCard">
  <h2>Login</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Create Account</button>
  <div id="authMessage"></div>
</div>

<div id="appShell" style="display:none;">
  <h2>Dashboard</h2>
  <p id="userLine"></p>
  <button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://asktsoajslylhuxajnic.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_TiND-DM-GZUcIVJ39EEvGQ_Tj7Fmwam";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const el = {
  authCard: document.getElementById('authCard'),
  appShell: document.getElementById('appShell'),
  email: document.getElementById('email'),
  password: document.getElementById('password'),
  authMessage: document.getElementById('authMessage'),
  userLine: document.getElementById('userLine')
};

let state = { user: null };

function showMessage(msg) {
  el.authMessage.innerText = msg || '';
}

async function afterAuth() {
  console.log('afterAuth start');

  el.authCard.style.display = 'none';
  el.appShell.style.display = 'block';

  el.userLine.textContent = `Logged in as ${state.user.email}`;

  console.log('afterAuth done');
}

async function login() {
  try {
    showMessage('');

    const email = el.email.value.trim();
    const password = el.password.value;

    console.log('login clicked');

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) throw error;

    console.log('login success', data);

    state.user = data.user;
    await afterAuth();

  } catch (err) {
    console.error(err);
    showMessage('Login failed: ' + err.message);
  }
}

async function signup() {
  try {
    showMessage('');

    const email = el.email.value.trim();
    const password = el.password.value;

    const { error } = await supabase.auth.signUp({ email, password });

    if (error) throw error;

    showMessage('Account created. Now login.');

  } catch (err) {
    showMessage('Signup failed: ' + err.message);
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// AUTO LOGIN ON REFRESH
async function init() {
  const { data } = await supabase.auth.getSession();

  if (data.session?.user) {
    state.user = data.session.user;
    await afterAuth();
  }
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('signupBtn').onclick = signup;

init();
</script>

</body>
</html>
